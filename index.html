function log(msg){ const el=document.getElementById('log'); el.style.display='block'; el.textContent+=msg+'\n'; el.scrollTop=99999; }
function status(msg,ok){ const el=document.getElementById('status'); el.style.display='block'; el.innerHTML=msg; el.style.background=ok===true?'#0f2d0f':ok===false?'#2d0f0f':'#161b22'; el.style.color=ok===true?'#7ee787':ok===false?'#f85149':'#c9d1d9'; }

async function doPush(){
  const token    = document.getElementById('token').value.trim();
  const repo     = document.getElementById('repo').value.trim();
  const filepath = document.getElementById('filepath').value.trim();
  if(!token){ alert('Token requis'); return; }

  status('⏳ Récupération SHA en cours…');
  log('→ GET ' + filepath);

  try{
    const getR = await fetch('https://api.github.com/repos/'+repo+'/contents/'+filepath,{
      headers:{ Authorization:'token '+token, Accept:'application/vnd.github.v3+json' }
    });
    const getData = await getR.json();
    log('   Status GET: '+getR.status);

    const sha = getData.sha || null;
    if(sha) log('   SHA: '+sha);
    else log('   (nouveau fichier, pas de SHA)');

    log('→ PUT '+filepath+' ('+Math.round(CONTENT_B64.length/1024)+' Ko)');
    status('⏳ Push en cours…');

    const body = { message:'feat: BoondMatch v2.1 — JWT HMAC correct + clientKey', content:CONTENT_B64 };
    if(sha) body.sha = sha;

    const putR = await fetch('https://api.github.com/repos/'+repo+'/contents/'+filepath,{
      method:'PUT',
      headers:{ Authorization:'token '+token, Accept:'application/vnd.github.v3+json', 'Content-Type':'application/json' },
      body: JSON.stringify(body)
    });
    const putData = await putR.json();
    log('   Status PUT: '+putR.status);

    if(putR.ok){
      const commit = putData.commit?.sha?.slice(0,7) || '?';
      log('   Commit: '+commit);
      status('✅ Poussé ! Attends 1-2 min puis recharge GitHub Pages.', true);
      const user = repo.split('/')[0];
      const repoName = repo.split('/')[1];
      log('→ URL: https://'+user+'.github.io/'+repoName+'/'+filepath);
    } else {
      log('   Erreur: '+JSON.stringify(putData));
      status('❌ Erreur : '+(putData.message||'inconnue'), false);
    }
  }catch(e){
    log('Exception: '+e.message);
    status('❌ Erreur réseau : '+e.message, false);
  }
}
