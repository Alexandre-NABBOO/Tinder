// UTILS
// ═══════════════════════════════════════════════════════
function initials(c){ return (c.firstName[0]+c.lastName[0]).toUpperCase(); }

function matchScore(candidate, need){
  // Scoring provisoire multi-critères (remplacé par scoring IA Claude ensuite)
  let score = 0;
  // 1. Skills matching (40 pts)
  if(need.skills && need.skills.length){
    const matched = candidate.skills.filter(s =>
      need.skills.some(ns => ns.toLowerCase().includes(s.toLowerCase()) || s.toLowerCase().includes(ns.toLowerCase()))
    );
    score += Math.round((matched.length / need.skills.length) * 40);
  }
  // 2. Titre / poste (30 pts)
  if(need.title && candidate.title){
    const nt = need.title.toLowerCase();
    const ct = candidate.title.toLowerCase();
    const needWords = nt.split(/\s+/).filter(w=>w.length>3);
    const titleMatches = needWords.filter(w => ct.includes(w));
    if(titleMatches.length > 0) score += Math.round((titleMatches.length / needWords.length) * 30);
  }
  // 3. TJM compatible (15 pts)
  if(need.tjm && candidate.tjm){
    const ratio = candidate.tjm / need.tjm;
    if(ratio <= 1.1) score += 15;
    else if(ratio <= 1.3) score += 8;
  } else if(!candidate.tjm){ score += 8; } // TJM non renseigné = neutre
  // 4. Commentaire / références contiennent mots-clés (15 pts)
  if(need.skills && need.skills.length){
    const blob = ((candidate.commentaire||'') + ' ' + (candidate.references||'')).toLowerCase();
    const kwMatches = need.skills.filter(s => blob.includes(s.toLowerCase()));
    if(kwMatches.length) score += Math.round((kwMatches.length / need.skills.length) * 15);
  }
  return Math.min(score, 99); // max 99 pour laisser le scoring IA final décider du 100
}

function escHtml(str){ return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// JWT Boond — format validé (BoondAI / ClaudeBoost)
// header: {alg:"HS256", type:"JWT"} base64 avec padding
// payload: {userToken, clientToken, time, mode:"normal"} base64 avec padding
// signature: HMAC-SHA256(clientKey) base64 avec padding
// header HTTP: X-Jwt-Client-Boondmanager
async function buildJWT(userToken, clientToken, clientKey){
  const header  = btoa(JSON.stringify({ alg:"HS256", type:"JWT" }));
  const payload = btoa(JSON.stringify({ userToken, clientToken, time: Math.floor(Date.now()/1000), mode:"normal" }));
  const data    = header + "." + payload;
  const keyBytes  = new TextEncoder().encode(clientKey);
  const cryptoKey = await crypto.subtle.importKey("raw", keyBytes, { name:"HMAC", hash:"SHA-256" }, false, ["sign"]);
  const sig    = await crypto.subtle.sign("HMAC", cryptoKey, new TextEncoder().encode(data));
  const sigB64 = btoa(String.fromCharCode(...new Uint8Array(sig)));
  return data + "." + sigB64;
}

async function boondGet(path, userToken, clientToken, clientKey){
  const jwt = await buildJWT(userToken, clientToken, clientKey);
  const res = await fetch(`https://ui.boondmanager.com/api${path}`, {
    headers:{ "Content-Type":"application/json", "X-Jwt-Client-Boondmanager": jwt }
  });
  if(!res.ok){ const err = await res.text(); throw new Error(`Boond API ${res.status}: ${err}`); }
  return res.json();
}

function normalizeNeed(raw){
  // TAB_AO: Appel d'offres / Opportunité Boond
  const attr     = raw.attributes || raw;
  const rels     = raw.relationships || {};
  const included = raw.included || [];

  // Compétences: AO_OUTILS format "tool1|level#tool2|level"
  let skills = [];
  if(attr.tools){
    skills = String(attr.tools).split('|').map(s=>s.split('#')[0].trim()).filter(Boolean);
  }

  // TJM
  const tjm = attr.averageDailyRate || attr.dailyRate || (attr.tauxHoraire ? attr.tauxHoraire+'€/j' : null) || "—";

  // Resp Manager du besoin = mainManager dans relationships
  const managerRel  = rels.mainManager || rels.manager || {};
  const managerRef  = managerRel.data || {};
  const managerId   = managerRef.id || attr.mainManagerId || attr.managerId || null;

  // Résoudre le nom depuis included (JSON:API sideloading)
  let managerFirstName = "", managerLastName = "";
  if(managerId && included.length){
    const inc = included.find(function(x){ return String(x.id) === String(managerId) && x.type === "resource"; });
    if(inc){
      const ia = inc.attributes || inc;
      managerFirstName = ia.firstName || ia.firstname || ia.prenom || "";
      managerLastName  = ia.lastName  || ia.lastname  || ia.nom    || "";
    }
  }
  const managerName = attr.managerName
    || (managerFirstName && managerLastName ? managerFirstName + " " + managerLastName : null)
    || managerFirstName || managerLastName
    || "—";

  // Client
  const clientData = rels.company?.data || rels.customer?.data || {};
  const clientName = attr.companyName || clientData.name || "—";

  return {
    id:          raw.id || attr.reference || attr.ref || "—",
    title:       attr.title || attr.name || "Sans titre",
    client:      clientName,
    startDate:   attr.startDate || attr.start || attr.debut || "—",
    endDate:     attr.endDate   || attr.end   || attr.fin   || "—",
    duration:    attr.duration  || (attr.duree ? attr.duree+' jours' : "—"),
    location:    attr.location  || attr.lieu  || attr.city  || "—",
    tjm:         typeof tjm === 'number' ? tjm+'€/j' : tjm,
    skills:      skills,
    description: attr.description || attr.criteres || attr.comment || "",
    manager: {
      name:  managerName,
      email: attr.managerEmail || "—",
      phone: attr.managerPhone || "—",
    },
    managerId: managerId,
    status:   attr.state !== undefined ? String(attr.state) : "active",
    priority: attr.priority || (attr.proba >= 70 ? "high" : attr.proba >= 40 ? "medium" : "low"),
  };
}

      <span class="step-label ${cstatus}">${s}</span>
    </div>`;
    if(i<steps.length-1) html += `<div class="step-line ${i<cur?'done':'pending'}"></div>`;
  });
  html += '</div>';
  document.getElementById('stepbar').innerHTML = html;
}

async function startMatching(){

      const d = detailData.data || detailData;
      console.log("[BoondMatch] === DETAIL BESOIN ===");

      console.log("[BoondMatch] attributes keys:", Object.keys(d.attributes||d).join(", "));
      console.log("[BoondMatch] included count:", (d.included||[]).length);
      // Injecter included dans raw pour résoudre les noms (JSON:API sideloading)

      needDetail.jsonApiType = d.type || "opportunity";  // type JSON:API réel retourné par Boond
      console.log("[BoondMatch] need.jsonApiType:", needDetail.jsonApiType);

      // Résoudre le Resp Manager depuis /resources/{managerId} (toujours)

          const fullName = (fn + " " + ln).trim();
          if(fullName){
            needDetail.manager.name = fullName;
          }
          console.log("[BoondMatch] Resp Manager:", needDetail.manager.name, "| managerId:", needDetail.managerId);
        } catch(e){
          console.warn("[BoondMatch] Manager fetch failed:", e.message);
        }
      } else {
        console.warn("[BoondMatch] Pas de managerId dans ce besoin. relationships.mainManager vide ?");
      }
    }
  } catch(e){ console.warn('Detail besoin:', e.message); }

  // Charger les ressources Boond
  let candidates = MOCK_CANDIDATES;
  try {
    if(!state.isMock){
      streamEl.style.color='#f59e0b'; streamEl.textContent='Chargement de 100 ressources Boond…';
      const resData = await boondGet('/resources?maxResults=100&state=1', state.userToken, state.clientToken, state.clientKey);
      const items = (resData.data || resData.resources || []).slice(0, 100);
      if(items.length > 0){
        // Charger détails en parallèle (commentaires + références)
        streamEl.textContent = `Chargement des détails (${items.length} profils en parallèle)…`;
        const details = await Promise.allSettled(
          items.map(r => boondGet(`/resources/${r.id}`, state.userToken, state.clientToken, state.clientKey))
        );

        candidates = items.map((r, i) => {
          const a = r.attributes || r;
          const skills = [];
          if(a.tools) String(a.tools).split('|').forEach(t=>{ const s=t.split('#')[0].trim(); if(s) skills.push(s); });

          // Récupérer commentaires et références depuis le détail
          let commentaire = '';
          let references = [];
          if(details[i].status === 'fulfilled'){
            const det = details[i].value;
            const da = (det.data && det.data.attributes) || det.attributes || det.data || {};
            commentaire = da.information?.comments || da.comments || da.comment || da.paramCommentaire || '';
            // Références/expériences
            const refs = det.data?.relationships?.experiences?.data || det.included?.filter(x=>x.type==='experience') || [];
            references = refs.map(ref => {
              const ra = ref.attributes || ref;
              return `${ra.title||ra.position||''} (${ra.startDate||ra.debut||''} - ${ra.endDate||ra.fin||'en cours'}) : ${ra.description||ra.mission||''}`.trim();
            }).filter(Boolean).slice(0, 5).join(' | ');
          }

          return {
            id:           r.id || a.id,
            firstName:    a.firstName || (a.name||'').split(' ')[0] || '?',
            lastName:     a.lastName  || (a.name||'').split(' ').slice(1).join(' ') || '?',
            title:        a.title || a.status || '—',
            availability: a.availabilityDate || '—',

            experience:   a.experience || 0,
            phone:        a.phone1 || '',

            commentaire:  commentaire,
            references:   references,
          };
        });
        streamEl.textContent = `${candidates.length} ressources chargées avec détails ✓`;
      }
    }
  } catch(e){ console.warn('Ressources:', e.message); candidates = MOCK_CANDIDATES; }

  // Pré-tri provisoire par matchScore (multi-critères)
  const preSorted = candidates
    .map(c=>({...c, score: matchScore(c, needDetail)}))
    .sort((a,b)=>b.score-a.score)
    .slice(0, 20); // Top 20 pour scoring IA

  state.need = needDetail;
  state.proposalIndex = 0;

  const countEl = document.getElementById('cands-count');
  if(countEl) countEl.textContent = `Scoring IA en cours sur ${preSorted.length} profils…`;

  // ── SCORING IA CLAUDE : attribue un score 0-100 à chaque candidat ──
  streamEl.style.color='#f59e0b'; streamEl.textContent = 'Scoring IA des profils par Claude…';

Titre: ${needDetail.title}

Compétences requises: ${(needDetail.skills||[]).join(', ')||'non précisées'}
TJM cible: ${needDetail.tjm||'non précisé'}€/j
Localisation: ${needDetail.location||'non précisée'}
Description: ${needDetail.description||''}

CANDIDATS À ÉVALUER:
${preSorted.map((c,i)=>`ID:${c.id} | ${c.firstName} ${c.lastName} | Poste: ${c.title||'—'} | TJM: ${c.tjm||'?'}€/j | Lieu: ${c.location||'—'}
Skills: ${c.skills.slice(0,10).join(', ')||'non renseignés'}
${c.commentaire?'Info: '+c.commentaire.slice(0,200):''}
${c.references?'Refs: '+c.references.slice(0,200):''}`).join('\n---\n')}

Réponds UNIQUEMENT avec un objet JSON valide, sans markdown, sans explication:
{"scores":[{"id":"ID_CANDIDAT","score":85,"raison":"...courte raison..."},...]}

Critères de scoring (0-100):
- 40pts: correspondance compétences techniques avec le besoin
- 25pts: pertinence du titre/poste actuel
- 20pts: cohérence TJM avec le budget
- 15pts: expériences et références liées au secteur

Classe du meilleur au moins bon.`;

  let aiScores = {};
  try{
    const aiRes = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true','x-api-key':state.claudeKey},
      body: JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:1500,
        messages:[{role:'user',content:scoringPrompt}] })
    });
    const aiJson = await aiRes.json();
    const aiText = (aiJson.content||[]).map(b=>b.text||'').join('');
    const parsed = JSON.parse(aiText.replace(/```json|```/g,'').trim());
    (parsed.scores||[]).forEach(s=>{ aiScores[s.id] = {score:s.score, raison:s.raison}; });
    console.log('[BoondMatch] AI scores:', aiScores);
  } catch(e){
    console.warn('[BoondMatch] Scoring IA échoué, fallback matchScore:', e.message);
  }

  // Appliquer les scores IA ou fallback
  const scored = preSorted
    .map(c=>({...c,
      score:   aiScores[c.id] ? aiScores[c.id].score : c.score,
      raison:  aiScores[c.id] ? aiScores[c.id].raison : ''
    }))
    .sort((a,b)=>b.score-a.score);

      }
    }, i*150);
  });

  // ── ANALYSE NARRATIVE Claude (stream) ──

  const prompt = `Tu es un expert en recrutement pour le secteur nucléaire et ingénierie.

BESOIN: ${needDetail.title} | Client: ${needDetail.client} | TJM: ${needDetail.tjm}€/j | Lieu: ${needDetail.location}

CLASSEMENT IA (top 5):
${scored.slice(0,5).map((c,i)=>`${i+1}. ${c.firstName} ${c.lastName} — Score IA: ${c.score}%
   Poste: ${c.title||'—'} | TJM: ${c.tjm||'?'}€ | ${c.location||'—'}
   ${c.raison?'Raison IA: '+c.raison:''}
   Skills: ${c.skills.slice(0,8).join(', ')||'—'}
   ${c.commentaire?'Info: '+c.commentaire.slice(0,200):''}`).join('\n---\n')}

Analyse en 3 paragraphes concis:
1. Candidat #1 recommandé et pourquoi
2. Alternatives pertinentes (rang 2-3)
3. Recommandation actionnable pour le manager`;

  try{
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true','x-api-key':state.claudeKey},
      body: JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:800, stream:true,
        messages:[{role:'user',content:prompt}] })
    });

    const reader  = res.body.getReader();
    const decoder = new TextDecoder();
    let full = '';
    while(true){
      const {done,value} = await reader.read();
      if(done) break;
      const lines = decoder.decode(value).split('\n').filter(l=>l.startsWith('data: '));
      for(const line of lines){
        try{
          const data = JSON.parse(line.slice(6));
          if(data.type==='content_block_delta'&&data.delta?.text){
            full+=data.delta.text;
            streamEl.style.color='#cbd5e1'; streamEl.style.fontStyle='normal';
            streamEl.textContent = full + '▌';
          }
        }catch{}
      }
    }
    streamEl.textContent = full;
    if(dotEl){ dotEl.style.background='#22c55e'; dotEl.style.boxShadow='none'; dotEl.classList.remove('anim-pulse'); }

    // ── PASSAGE AUTOMATIQUE à l\'étape validation ──
    streamEl.insertAdjacentHTML('afterend','<div style="color:#22c55e;font-size:11px;margin-top:8px;text-align:center">✅ Analyse terminée — passage automatique à la validation...</div>');
    setTimeout(()=>{ state.step=3; render(); }, 2000);

  }catch(e){
    streamEl.style.color='#ef4444';
    streamEl.textContent = 'Erreur d\'analyse. Vérifiez votre clé API Claude.';
  }
}

function renderValidation(){
  const need   = state.need;
  const scored = state.scored;
  const selIds = state.selectedCandidates;

  function buildMsg(){
    const sel = scored.filter(c=>selIds.includes(c.id));
    return `Bonjour,\n\nSuite au besoin « ${need.title} » (${need.id}) pour ${need.client}, voici les candidats identifiés :\n\n${sel.map(c=>`• ${c.firstName} ${c.lastName} – ${c.title} (${c.score}% match, ${c.tjm}€/j, dispo ${c.availability})`).join('\n')}\n\nMerci de confirmer votre accord pour les contacter.\n\nCordialement,`;
  }

  return `
  <div class="card-dark mb16">
    <div class="label mb12">Sélectionner les candidats à proposer</div>
    ${scored.map(c=>`
    <div class="candidate-row ${selIds.includes(c.id)?'selected':''}" data-id="${escHtml(c.id)}">
      <div class="checkbox ${selIds.includes(c.id)?'checked':''}">${selIds.includes(c.id)?'✓':''}</div>
      <div class="avatar ${selIds.includes(c.id)?'avatar-blue':'avatar-gray'}">${initials(c)}</div>
      <div class="flex-1">
        <div style="font-size:13px;color:#f1f5f9;font-weight:600">${escHtml(c.firstName)} ${escHtml(c.lastName)}</div>
        <div style="font-size:11px;color:#64748b">${escHtml(c.title)} · ${c.tjm}€/j</div>
      </div>
      <div class="score-${c.score>=80?'high':c.score>=60?'mid':'low'}" style="font-size:16px;font-weight:900">${c.score}%</div>
    </div>`).join('')}
  </div>
  <textarea id="msg-preview" rows="9" readonly>${escHtml(buildMsg())}</textarea>
  <div style="margin-top:14px">
    <div id="notif-area" style="margin-bottom:10px"></div>
    <button class="btn ${(state.validationStatus==='approved'||state.validationStatus==='pending')&&selIds.length?'btn-green':'btn-disabled'}" id="btn-validate" ${(state.validationStatus==='approved'||state.validationStatus==='pending')&&selIds.length?'':'disabled'}>
      ✅ Valider — Préparer WhatsApp (${selIds.length} candidat${selIds.length>1?'s':''})
    </button>
  </div>`;
}

function bindValidation(){
  const need   = state.need;
  const vs     = state.validationStatus;
  const scored = state.scored;

  // Candidat actuellement proposé (index dans le classement)
  if(state.proposalIndex === undefined) state.proposalIndex = 0;

  function refresh(){
    document.getElementById('screen').innerHTML = renderValidation();
    bindValidation();
  }

  function buildThreadMsg(candidate){
    const tjm   = candidate.tjm   ? candidate.tjm + " €/j"           : "TJM non communiqué";
    const dispo = candidate.availability && candidate.availability !== "—" ? candidate.availability : "à définir";
    return [
      "Bonjour,",
      "",
      "Suite à l'analyse IA du besoin « " + need.title + " » (" + need.id + "),",
      "BoondMatch propose le profil suivant (rang #" + (state.proposalIndex + 1) + " du matching) :",
      "",
      "• " + candidate.firstName + " " + candidate.lastName,
      "  Score : " + candidate.score + "% de match",
      "  Poste : " + (candidate.title || "—"),
      "  TJM   : " + tjm,
      "  Dispo : " + dispo,
      "  Lieu  : " + (candidate.location || "—"),
      "",
      "Répondez OUI pour valider ce profil, ou NON pour passer au suivant.",
      "",
      "Cordialement,",
      "BoondMatch — NABBOO.AI"
    ].join("\n");
  }

  async function proposeCandidate(index){
    if(!scored || index >= scored.length){
      notifArea.innerHTML = "<div style=\"color:#ef4444;font-weight:700\">❌ Plus aucun candidat disponible dans le classement.</div>";
      return;
    }
    const candidate = scored[index];
    state.proposalIndex = index;
    state.selectedCandidates = [candidate.id];

    notifArea.innerHTML = "<div style=\"color:#f59e0b;font-size:12px\">⏳ Envoi de la proposition #" + (index+1) + " sur le fil Boond...</div>";

    const msg = buildThreadMsg(candidate);
    const threadId = await sendBoondNotification(need.managerId, need.id, need.jsonApiType || "opportunity", need.title, msg);
    state.threadId = threadId || null;
    state.validationStatus = "notified";

    if(threadId){
      showWaiting(index, candidate);
      pollThreadResponse(
        threadId,
        function(){ // OUI → approuvé
          stopPoll();
          state.validationStatus = "approved";
          refresh();
        },
        function(){ // NON → proposer suivant
          stopPoll();
          state.validationStatus = "pending";
          proposeCandidate(index + 1);
        }
      );
    } else {
      notifArea.innerHTML = "<div style=\"color:#ef4444;font-size:12px\">⚠️ Échec de l\'envoi sur Boond.</div>"
        + "<div style=\"display:flex;gap:10px;margin-top:10px\">"
        + "<button class=\"btn btn-green\" id=\"btn-yes\" style=\"flex:1\">✅ Valider manuellement</button>"
        + "<button class=\"btn\" id=\"btn-no\" style=\"flex:1;background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff\">❌ Passer au suivant</button>"
        + "</div>";
      document.getElementById("btn-yes").addEventListener("click", function(){ state.validationStatus="approved"; refresh(); });
      document.getElementById("btn-no").addEventListener("click",  function(){ proposeCandidate(index + 1); });
    }
  }

  function showWaiting(index, candidate){
    notifArea.innerHTML = "<div style=\"color:#22c55e;font-size:12px;margin-bottom:6px\">✅ Proposition #" + (index+1) + " envoyée sur le fil Boond</div>"
      + "<div style=\"color:#f1f5f9;font-size:12px;margin-bottom:4px\">👤 <b>" + escHtml(candidate.firstName + " " + candidate.lastName) + "</b> — " + candidate.score + "% match</div>"
      + "<div style=\"color:#94a3b8;font-size:11px;margin-bottom:10px\">⏳ En attente de réponse du manager dans Boond (OUI / NON)...</div>"
      + "<div style=\"display:flex;gap:10px;margin-top:10px\">"
      + "<button class=\"btn btn-green\" id=\"btn-yes\" style=\"flex:1\">✅ Valider manuellement</button>"
      + "<button class=\"btn\" id=\"btn-no\" style=\"flex:1;background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff\">⏭ Passer au suivant</button>"
      + "</div>";
    document.getElementById("btn-yes").addEventListener("click", function(){ stopPoll(); state.validationStatus="approved"; refresh(); });
    document.getElementById("btn-no").addEventListener("click",  function(){ stopPoll(); proposeCandidate(state.proposalIndex + 1); });
  }

  // ── 1. Injecter notif-area EN PREMIER (avant d'attacher les listeners) ──
  const notifArea = document.getElementById("notif-area");
  if(notifArea){
    if(vs === "pending"){
      // AUTO-ENVOI : proposer immédiatement le candidat #1 si manager disponible
      if(scored.length > 0 && (need.managerId) && !state.isMock){
        notifArea.innerHTML = "<div style=\"color:#f59e0b;font-size:12px\">⏳ Analyse terminée — envoi automatique de la proposition...</div>";
        setTimeout(function(){ proposeCandidate(state.proposalIndex || 0); }, 800);
      } else {
        notifArea.innerHTML = "<div style=\"color:#94a3b8;font-size:12px\">Aucun manager identifié — validez manuellement.</div>"
          + "<div style=\"display:flex;gap:10px;margin-top:10px\">"
          + "<button class=\"btn btn-green\" id=\"btn-yes\" style=\"flex:1\">✅ Valider</button>"
          + "</div>";
        document.getElementById("btn-yes").addEventListener("click", function(){ state.validationStatus="approved"; refresh(); });
      }
    } else if(vs === "notified"){
      // Reprendre le poll si page re-render
      const cand = scored[state.proposalIndex || 0];
      if(state.threadId && !_pollInterval && cand){
        showWaiting(state.proposalIndex || 0, cand);
        pollThreadResponse(
          state.threadId,
          function(){ stopPoll(); state.validationStatus="approved"; refresh(); },
          function(){ stopPoll(); state.validationStatus="pending"; proposeCandidate((state.proposalIndex||0) + 1); }
        );
      } else if(cand){
        showWaiting(state.proposalIndex || 0, cand);
      }
    } else if(vs === "approved"){
      notifArea.innerHTML = "<div style=\"color:#22c55e;font-weight:700;font-size:13px;margin-bottom:10px\">✅ Validé par le manager !</div>";
    } else if(vs === "rejected"){
      notifArea.innerHTML = "<div style=\"color:#ef4444;font-weight:700;font-size:13px;margin-bottom:10px\">❌ Refusé</div>";
    }
  }

  // ── 2. Attacher les listeners des cases APRÈS (DOM stable) ──
  document.querySelectorAll('.candidate-row').forEach(function(row){
    row.addEventListener('click', function(){
      const id = row.dataset.id;
      if(state.selectedCandidates.includes(id)){
        state.selectedCandidates = state.selectedCandidates.filter(function(x){ return x !== id; });
      } else {
        state.selectedCandidates = [...state.selectedCandidates, id];
      }
      refresh();
    });
  });

  // ── 3. Bouton WhatsApp ──
  const btn = document.getElementById("btn-validate");
  if(btn && !btn.disabled){
    btn.addEventListener("click", function(){
      state.validated = state.scored.filter(function(c){ return state.selectedCandidates.includes(c.id); });
      state.step = 4; render();
    });
  }
}

async function genWaMessage(c){
  const need = state.need;
  state.waGenerating[c.id] = true;
  refreshWaCard(c);

  const prompt = `Rédige un message WhatsApp professionnel et personnalisé pour contacter ce consultant.

Consultant: ${c.firstName} ${c.lastName}, ${c.title}
Mission: ${need.title} pour ${need.client}
Lieu: ${need.location} | Durée: ${need.duration} | Démarrage: ${need.startDate} | TJM: ${need.tjm}€/j

Le message doit être: court (5-7 lignes), chaleureux et direct, mentionner que leur profil correspond bien, se terminer par une question sur leur disponibilité, commencer par "Bonjour ${c.firstName},", signé "NABBOO Conseil". Max 2 émojis.`;

  try{
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true','x-api-key':state.claudeKey},
      body: JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:300, messages:[{role:'user',content:prompt}] })
    });
    const data = await res.json();
    state.waMessages[c.id] = data.content?.[0]?.text || 'Erreur de génération.';
  }catch{
    state.waMessages[c.id] = 'Erreur lors de la génération.';
  }
  state.waGenerating[c.id] = false;
  refreshWaCard(c);
}

function refreshWaCard(c){
  const card = document.getElementById(`wa-${c.id}`);
  if(!card) return;
  const msgEl  = card.querySelector(`#msg-${c.id}`);
  const regenBtn = card.querySelector('.btn-regen');
  const sendBtn  = card.querySelector('.btn-send');
  if(msgEl){
    if(state.waGenerating[c.id]){
      msgEl.style.color='#475569'; msgEl.style.fontStyle='italic'; msgEl.textContent='Génération du message…';
    }else{
      msgEl.style.color='#cbd5e1'; msgEl.style.fontStyle='normal';
      msgEl.textContent = state.waMessages[c.id]||'';
    }
  }
  if(regenBtn) regenBtn.disabled = !!state.waGenerating[c.id];
  if(sendBtn){
    const canSend = state.waMessages[c.id]&&!state.waGenerating[c.id];
    sendBtn.disabled = !canSend;
    sendBtn.className = `btn-send ${canSend?'btn-wa':'btn-disabled'}`;
  }
}

function startWhatsApp(){
  // Generate all messages
  state.validated.forEach(c=>{ if(!state.waMessages[c.id]) genWaMessage(c); });

  // Bind events (delegation)
  document.getElementById('screen').addEventListener('click',e=>{
    const regenBtn = e.target.closest('.btn-regen');
    const sendBtn  = e.target.closest('.btn-send');
    if(regenBtn){
      const id = regenBtn.dataset.id;
      const c  = state.validated.find(x=>x.id===id);
      if(c) genWaMessage(c);
    }
    if(sendBtn&&!sendBtn.disabled){
      const id  = sendBtn.dataset.id;
      const phone = sendBtn.dataset.phone;
      const msg = state.waMessages[id]||'';
      window.open(`https://web.whatsapp.com/send?phone=${phone.replace(/\D/g,'')}&text=${encodeURIComponent(msg)}`,'_blank');
      state.waSent[id]=true;
      // Update badge
      const card = document.getElementById(`wa-${id}`);
      if(card) card.classList.add('sent');
      const header = card&&card.querySelector('.flex-row');
      if(header&&!header.querySelector('.sent-badge')){
        const badge = document.createElement('span');
        badge.className='sent-badge';
        badge.style.cssText='font-size:10px;background:#052e16;color:#4ade80;border:1px solid #16a34a;border-radius:5px;padding:3px 9px;font-weight:700';
        badge.textContent='ENVOYÉ';
        header.appendChild(badge);
      }
    }
  });
}

// POLL : surveille les réponses au thread Boond
let _pollInterval = null;
function stopPoll(){ if(_pollInterval){ clearInterval(_pollInterval); _pollInterval = null; } }

async function pollThreadResponse(threadId, onApprove, onReject){
  stopPoll();
  console.log("[BoondMatch] Poll démarré sur thread", threadId);
  _pollInterval = setInterval(async function(){
    try {
      const jwt = await buildJWT(state.userToken, state.clientToken, state.clientKey);
      // GET sur le thread lui-même pour voir ses réponses (answers)
      const r = await fetch("https://ui.boondmanager.com/api/threads/" + threadId, {
        headers: { "X-Jwt-Client-Boondmanager": jwt }
      });
      const json = await r.json();
      // Vérifier les threads enfants (réponses)
      // Chercher les réponses : threads liés à l'opportunité avec id > threadId
      let answers = [];
      if(state.need && state.need.id){
        try {
          const r2 = await fetch("https://ui.boondmanager.com/api/threads?keywords=" + state.need.id + "&maxResults=50", {
            headers: { "X-Jwt-Client-Boondmanager": jwt }
          });
          const json2 = await r2.json();
          const all = json2.data || [];
          // Garder uniquement les threads enfants du thread BoondMatch (parentThread = threadId)
          answers = all.filter(t => {
            const parent = (t.relationships && t.relationships.parentThread && t.relationships.parentThread.data);
            return parent && String(parent.id) === String(threadId);
          });
          // Fallback : tous les threads plus récents que threadId sur cette opportunité
          if(answers.length === 0){
            answers = all.filter(t => parseInt(t.id) > parseInt(threadId));
          }
          console.log("[BoondMatch] Poll trouvé", all.length, "threads, filtrés:", answers.length, "réponses");
        } catch(e2){ console.warn("[BoondMatch] Poll fetch error:", e2.message); }
      }
      console.log("[BoondMatch] Poll réponses:", answers.length, answers.map(a=>(a.attributes||{}).text));
      for(const ans of answers){
        const raw = (ans.attributes && ans.attributes.text) || "";
        const txt = raw.replace(/<[^>]+>/g," ").replace(/&nbsp;/g," ").trim().toUpperCase();
        console.log("[BoondMatch] Réponse nettoyée:", txt);
        if(txt === "OUI" || txt === "OK" || txt.includes("OUI") || txt.includes("ACCORD") || txt.includes("VALID")){
          stopPoll();
          if(onApprove) onApprove();
          return;
        }
        if(txt === "NON" || txt === "KO" || txt.includes("NON") || txt.includes("REFUS")){
          stopPoll();
          if(onReject) onReject();
          return;
        }
      }
    } catch(e){ console.warn("[BoondMatch] Poll error:", e.message); }
  }, 10000); // toutes les 10 secondes
}
// ═══════════════════════════════════════════════════════
// BOOT

async function sendBoondNotification(managerId, needId, needType, subject, message){
  if(state.isMock || !managerId) return false;
  try {
    const jwt   = await buildJWT(state.userToken, state.clientToken, state.clientKey);
    const today = new Date().toISOString().substring(0, 10);
    const bodyObj = {
      data: {
        type: "thread",
        attributes: {
          text:  "<div>" + subject + "</div><div>" + message.replace(/\n/g, "</div><div>") + "</div>",
          share: false
        },
        relationships: {
          dependsOn: { data: { id: String(needId), type: "opportunity" } }
        }
      }
    };
    const body = JSON.stringify(bodyObj);
    console.log("[BoondMatch] Thread body:", body);
    const res = await fetch("https://ui.boondmanager.com/api/threads", {
      method: "POST",
      headers: {
        "Content-Type": "application/vnd.api+json",
        "X-Jwt-Client-Boondmanager": jwt
      },
      body: body
    });
    const respText = await res.text();
    console.log("[BoondMatch] Notif status:", res.status);
    let parsed = null;
    try {
      parsed = JSON.parse(respText);
      if(parsed.errors) console.log("[BoondMatch] Notif errors:", JSON.stringify(parsed.errors, null, 2));
      if(parsed.data)   console.log("[BoondMatch] Thread créé ID:", parsed.data.id);
    } catch(e){ console.log("[BoondMatch] Notif raw:", respText); }
    if(res.ok && parsed && parsed.data && parsed.data.id){
      return parsed.data.id; // retourne l'ID du thread
    }
    return null;
  } catch(e) {
    console.warn("[BoondMatch] Notif error:", e.message);
    return false;
  }
}
